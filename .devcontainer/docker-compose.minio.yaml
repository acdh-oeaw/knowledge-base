services:
  minio:
    image: minio/minio:latest
    container_name: the-knowledge-base-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${MINIO_WEB_UI_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minio-data:
    name: the-knowledge-base-minio-data

networks:
  default:
    name: the-knowledge-base
