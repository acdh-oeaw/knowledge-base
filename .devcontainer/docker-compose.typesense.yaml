services:
  typesense:
    image: typesense/typesense:30.0
    container_name: the-knowledge-base-typesense
    restart: unless-stopped
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_ADMIN_API_KEY}
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_ENABLE_CORS: true
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    volumes:
      - typesense-data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8108"]
      interval: 5s
      timeout: 5s
      start_period: 15s
      retries: 10

  typesense-dashboard:
    image: ghcr.io/bfritscher/typesense-dashboard:latest
    container_name: the-knowledge-base-typesense-dashboard
    restart: unless-stopped
    depends_on:
      typesense:
        condition: service_healthy
    ports:
      - "${TYPESENSE_DASHBOARD_PORT:-5050}:80"

volumes:
  typesense-data:
    name: the-knowledge-base-typesense-data

networks:
  default:
    name: the-knowledge-base
